name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build and smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive lowercase image repository
        run: echo "IMAGE_REPO=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          platforms: linux/amd64
          tags: sentry-live:local
          cache-from: type=registry,ref=${{ env.IMAGE_REPO }}:nightly
          cache-to: type=inline
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Smoke test
        run: |
          trap 'docker logs sentry-live-smoke || true' ERR

          docker run --rm -d \
            --name sentry-live-smoke \
            -p 7000:7000 \
            -p 5556:5556/udp \
            -e HOST=0.0.0.0 \
            sentry-live:local

          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:7000/healthz | grep -qx "ok"; then
              break
            fi
            echo "Waiting for healthz... ($i)"
            sleep 1
          done

          HEALTH=$(curl -sf http://127.0.0.1:7000/healthz)
          [ "$HEALTH" = "ok" ] || (echo "healthz returned: $HEALTH" && exit 1)

          curl -sf http://127.0.0.1:7000/ | grep -q 'id="root"' || (echo "index missing expected root element" && exit 1)

          docker stop sentry-live-smoke

      - name: Push to GHCR
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_REPO }}:nightly
            ${{ env.IMAGE_REPO }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_REPO }}:nightly
          cache-to: type=inline
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
